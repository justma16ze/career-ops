<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Template Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #eee; }
.header { position: sticky; top: 0; z-index: 100; background: #111; border-bottom: 1px solid #333; padding: 16px 24px; }
.header h1 { font-size: 18px; margin-bottom: 12px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.filters button { padding: 6px 14px; border: 1px solid #444; background: #222; color: #ccc; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.filters button:hover { border-color: #888; color: #fff; }
.filters button.active { background: #fff; color: #111; border-color: #fff; }
.filter-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; padding: 24px; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
.card:hover { border-color: #666; transform: translateY(-2px); }
.card.selected { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3); }
.card-label { padding: 10px 14px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.card-label .style-name { color: #38bdf8; }
.card-label .layout-name { color: #888; font-weight: 400; }
.card-label .blocked { color: #ef4444; font-size: 11px; }
.card iframe { width: 100%; height: 280px; border: none; pointer-events: none; transform-origin: 0 0; transform: scale(0.35); width: 285.7%; height: 800px; }
.card-frame { height: 280px; overflow: hidden; background: #000; }
.preview-modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); }
.preview-modal.open { display: flex; flex-direction: column; }
.preview-bar { padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #333; }
.preview-bar h2 { font-size: 16px; }
.preview-bar button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-close { background: #333; color: #fff; }
.btn-close:hover { background: #444; }
.btn-select { background: #38bdf8; color: #111; margin-left: 8px; }
.btn-select:hover { background: #7dd3fc; }
.preview-frame { flex: 1; }
.preview-frame iframe { width: 100%; height: 100%; border: none; }
.selected-banner { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #38bdf8; color: #111; padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 150; box-shadow: 0 4px 20px rgba(56,189,248,0.4); }
.selected-banner.show { display: flex; align-items: center; gap: 12px; }
.selected-banner button { padding: 6px 16px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <h1>Pick your portfolio template</h1>
  <div class="filter-label">Filter by style:</div>
  <div class="filters" id="style-filters"></div>
  <div class="filter-label" style="margin-top:8px">Filter by layout:</div>
  <div class="filters" id="layout-filters"></div>
</div>

<div class="grid" id="grid"></div>

<div class="preview-modal" id="modal">
  <div class="preview-bar">
    <h2 id="modal-title"></h2>
    <div>
      <button class="btn-close" onclick="closeModal()">Back</button>
      <button class="btn-select" onclick="selectFromModal()">Use this template</button>
    </div>
  </div>
  <div class="preview-frame">
    <iframe id="modal-iframe"></iframe>
  </div>
</div>

<div class="selected-banner" id="banner">
  <span id="banner-text"></span>
  <button onclick="confirmSelection()">Deploy this one</button>
</div>

<script>

t":"sidebar","blocked":false},{"name":"gradient-sidebar-right","style":"gradient","layout":"sidebar-right","blocked":false},{"name":"gradient-spread","style":"gradient","layout":"spread","blocked":false},{"name":"grid-bands","style":"grid","layout":"bands","blocked":false},{"name":"grid-cards","style":"grid","layout":"cards","blocked":false},{"name":"grid-centered","style":"grid","layout":"centered","blocked":false},{"name":"grid-multipage","style":"grid","layout":"multipage","blocked":false},{"name":"grid-scroll","style":"grid","layout":"scroll","blocked":false},{"name":"grid-sidebar","style":"grid","layout":"sidebar","blocked":false},{"name":"grid-sidebar-right","style":"grid","layout":"sidebar-right","blocked":false},{"name":"grid-spread","style":"grid","layout":"spread","blocked":false},{"name":"ink-bands","style":"ink","layout":"bands","blocked":false},{"name":"ink-cards","style":"ink","layout":"cards","blocked":false},{"name":"ink-centered","style":"ink","layout":"centered","blocked":false},{"name":"ink-multipage","style":"ink","layout":"multipage","blocked":false},{"name":"ink-scroll","style":"ink","layout":"scroll","blocked":false},{"name":"ink-sidebar","style":"ink","layout":"sidebar","blocked":false},{"name":"ink-sidebar-right","style":"ink","layout":"sidebar-right","blocked":false},{"name":"ink-spread","style":"ink","layout":"spread","blocked":false},{"name":"lab-bands","style":"lab","layout":"bands","blocked":false},{"name":"lab-cards","style":"lab","layout":"cards","blocked":false},{"name":"lab-centered","style":"lab","layout":"centered","blocked":false},{"name":"lab-multipage","style":"lab","layout":"multipage","blocked":false},{"name":"lab-scroll","style":"lab","layout":"scroll","blocked":false},{"name":"lab-sidebar","style":"lab","layout":"sidebar","blocked":false},{"name":"lab-sidebar-right","style":"lab","layout":"sidebar-right","blocked":false},{"name":"lab-spread","style":"lab","layout":"spread","blocked":false},{"name":"patrol-bands","style":"patrol","layout":"bands","blocked":false},{"name":"patrol-cards","style":"patrol","layout":"cards","blocked":false},{"name":"patrol-centered","style":"patrol","layout":"centered","blocked":false},{"name":"patrol-multipage","style":"patrol","layout":"multipage","blocked":false},{"name":"patrol-scroll","style":"patrol","layout":"scroll","blocked":false},{"name":"patrol-sidebar","style":"patrol","layout":"sidebar","blocked":false},{"name":"patrol-sidebar-right","style":"patrol","layout":"sidebar-right","blocked":false},{"name":"patrol-spread","style":"patrol","layout":"spread","blocked":false},{"name":"press-bands","style":"press","layout":"bands","blocked":false},{"name":"press-cards","style":"press","layout":"cards","blocked":false},{"name":"press-centered","style":"press","layout":"centered","blocked":false},{"name":"press-multipage","style":"press","layout":"multipage","blocked":false},{"name":"press-scroll","style":"press","layout":"scroll","blocked":false},{"name":"press-sidebar","style":"press","layout":"sidebar","blocked":false},{"name":"press-sidebar-right","style":"press","layout":"sidebar-right","blocked":false},{"name":"press-spread","style":"press","layout":"spread","blocked":false},{"name":"prose-bands","style":"prose","layout":"bands","blocked":false},{"name":"prose-cards","style":"prose","layout":"cards","blocked":false},{"name":"prose-centered","style":"prose","layout":"centered","blocked":false},{"name":"prose-multipage","style":"prose","layout":"multipage","blocked":false},{"name":"prose-scroll","style":"prose","layout":"scroll","blocked":false},{"name":"prose-sidebar","style":"prose","layout":"sidebar","blocked":false},{"name":"prose-sidebar-right","style":"prose","layout":"sidebar-right","blocked":false},{"name":"prose-spread","style":"prose","layout":"spread","blocked":false},{"name":"statement-bands","style":"statement","layout":"bands","blocked":false},{"name":"statement-cards","style":"statement","layout":"cards","blocked":false},{"name":"statement-centered","style":"statement","layout":"centered","blocked":false},{"name":"statement-multipage","style":"statement","layout":"multipage","blocked":false},{"name":"statement-scroll","style":"statement","layout":"scroll","blocked":false},{"name":"statement-sidebar","style":"statement","layout":"sidebar","blocked":false},{"name":"statement-sidebar-right","style":"statement","layout":"sidebar-right","blocked":false},{"name":"statement-spread","style":"statement","layout":"spread","blocked":false},{"name":"tactical-bands","style":"tactical","layout":"bands","blocked":false},{"name":"tactical-cards","style":"tactical","layout":"cards","blocked":false},{"name":"tactical-centered","style":"tactical","layout":"centered","blocked":false},{"name":"tactical-multipage","style":"tactical","layout":"multipage","blocked":false},{"name":"tactical-scroll","style":"tactical","layout":"scroll","blocked":false},{"name":"tactical-sidebar","style":"tactical","layout":"sidebar","blocked":false},{"name":"tactical-sidebar-right","style":"tactical","layout":"sidebar-right","blocked":false},{"name":"tactical-spread","style":"tactical","layout":"spread","blocked":false},{"name":"terminal-bands","style":"terminal","layout":"bands","blocked":false},{"name":"terminal-cards","style":"terminal","layout":"cards","blocked":false},{"name":"terminal-centered","style":"terminal","layout":"centered","blocked":false},{"name":"terminal-multipage","style":"terminal","layout":"multipage","blocked":false},{"name":"terminal-scroll","style":"terminal","layout":"scroll","blocked":false},{"name":"terminal-sidebar","style":"terminal","layout":"sidebar","blocked":false},{"name":"terminal-sidebar-right","style":"terminal","layout":"sidebar-right","blocked":false},{"name":"terminal-spread","style":"terminal","layout":"spread","blocked":false},{"name":"void-bands","style":"void","layout":"bands","blocked":false},{"name":"void-cards","style":"void","layout":"cards","blocked":false},{"name":"void-centered","style":"void","layout":"centered","blocked":false},{"name":"void-multipage","style":"void","layout":"multipage","blocked":false},{"name":"void-scroll","style":"void","layout":"scroll","blocked":false},{"name":"void-sidebar","style":"void","layout":"sidebar","blocked":false},{"name":"void-sidebar-right","style":"void","layout":"sidebar-right","blocked":false},{"name":"void-spread","style":"void","layout":"spread","blocked":false},{"name":"volt-bands","style":"volt","layout":"bands","blocked":false},{"name":"volt-cards","style":"volt","layout":"cards","blocked":false},{"name":"volt-centered","style":"volt","layout":"centered","blocked":false},{"name":"volt-multipage","style":"volt","layout":"multipage","blocked":false},{"name":"volt-scroll","style":"volt","layout":"scroll","blocked":false},{"name":"volt-sidebar","style":"volt","layout":"sidebar","blocked":false},{"name":"volt-sidebar-right","style":"volt","layout":"sidebar-right","blocked":false},{"name":"volt-spread","style":"volt","layout":"spread","blocked":false}];

const styles = [...new Set(combos.map(c => c.style))].sort();
const layouts = [...new Set(combos.map(c => c.layout))].sort();

let activeStyle = 'all';
let activeLayout = 'all';
let selected = null;
let modalCombo = null;

function renderFilters() {
  const sf = document.getElementById('style-filters');
  const lf = document.getElementById('layout-filters');
  sf.innerHTML = `<button class="${activeStyle==='all'?'active':''}" onclick="setStyle('all')">All</button>` +
    styles.map(s => `<button class="${activeStyle===s?'active':''}" onclick="setStyle('${s}')">${s}</button>`).join('');
  lf.innerHTML = `<button class="${activeLayout==='all'?'active':''}" onclick="setLayout('all')">All</button>` +
    layouts.map(l => `<button class="${activeLayout===l?'active':''}" onclick="setLayout('${l}')">${l}</button>`).join('');
}

function setStyle(s) { activeStyle = s; render(); }
function setLayout(l) { activeLayout = l; render(); }

function render() {
  renderFilters();
  const grid = document.getElementById('grid');
  const filtered = combos.filter(c =>
    (activeStyle === 'all' || c.style === activeStyle) &&
    (activeLayout === 'all' || c.layout === activeLayout)
  );
  grid.innerHTML = filtered.map(c => `
    <div class="card ${selected===c.name?'selected':''} ${c.blocked?'blocked':''}" onclick="openModal('${c.name}')">
      <div class="card-frame">
        <iframe src="${c.name}/index.html" loading="lazy" sandbox="allow-same-origin"></iframe>
      </div>
      <div class="card-label">
        <span><span class="style-name">${c.style}</span> x ${c.layout}</span>
        ${c.blocked ? '<span class="blocked">blocked combo</span>' : ''}
      </div>
    </div>
  `).join('');
}

function openModal(name) {
  modalCombo = name;
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-iframe').src = name + '/index.html';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-iframe').src = '';
}

function selectFromModal() {
  selected = modalCombo;
  closeModal();
  render();
  const banner = document.getElementById('banner');
  document.getElementById('banner-text').textContent = 'Selected: ' + selected;
  banner.classList.add('show');
}

function confirmSelection() {
  // Copy selection to clipboard for the user to paste back to Claude
  navigator.clipboard.writeText(selected).then(() => {
    document.getElementById('banner-text').textContent = 'Copied "' + selected + '" to clipboard -- paste it back in Claude Code';
  });
}

render();
</script>
