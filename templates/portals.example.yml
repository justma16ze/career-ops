# Portal Scanner Configuration
# Used by /speedrun scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. WebSearch with site: filters (broad discovery across Greenhouse/Ashby/Lever)
#   2. Playwright → career page if careers_url is provided (real-time, reliable)
#   3. Greenhouse API → structured JSON if api: is provided (fast, Greenhouse-only)
#
# Company names are scraped from portfoliojobs.a16z.com and speedrun.a16z.com.
# Career URLs are discovered dynamically at scan time — not hardcoded.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- Founding / early-stage roles --
    - "Founding Engineer"
    - "Founding"
    - "First Engineer"
    - "0 to 1"
    - "Early Stage"
    - "Staff Engineer"
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Applied AI"
    - "Voice AI"
    - "Conversational AI"
    - "Speech"
    # -- Engineering roles --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    - "Full Stack"
    - "Backend Engineer"
    - "Infrastructure Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    - "Product Engineer"
    # -- Growth / GTM engineering --
    - "Growth Engineer"
    - "GTM Engineer"
    - "RevOps"
    - "Developer Experience"
    - "DevRel"
    - "Developer Advocate"
    # -- Automation / internal tools --
    - "Automation"
    - "Internal Tools"
    - "Low-Code"
    - "No-Code"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Founding"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — Founding & Early Stage
    query: 'site:jobs.ashbyhq.com "Founding Engineer" OR "First Engineer" OR "0 to 1" OR "Early Stage"'
    enabled: true

  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Applied AI" OR "Forward Deployed"'
    enabled: true

  - name: Ashby — AI PM
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Senior Product Manager AI"'
    enabled: true

  - name: Ashby — Solutions Architect
    query: 'site:jobs.ashbyhq.com "Solutions Architect" OR "Solutions Engineer" AI OR automation'
    enabled: true

  - name: Ashby — Agentic
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "Automation Architect"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Founding & Early Stage
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Founding Engineer" OR "First Engineer" OR "0 to 1"'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" OR "Applied AI"'
    enabled: true

  - name: Greenhouse — AI PM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" AI'
    enabled: true

  - name: Greenhouse — SA & FDE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI'
    enabled: true

  # -- Lever --
  - name: Lever — Founding & AI Roles
    query: 'site:jobs.lever.co "Founding Engineer" OR "AI Engineer" OR "Agentic" OR "LLMOps"'
    enabled: true

  - name: Lever — AI PM & Solutions
    query: 'site:jobs.lever.co "AI Product Manager" OR "Solutions Architect" AI'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Founding Engineer
    query: 'site:wellfound.com "Founding Engineer" OR "First Engineer" OR "0 to 1"'
    enabled: true

  - name: Wellfound — AI & ML Roles
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "LLM"'
    enabled: true

  - name: Wellfound — Product Engineer
    query: 'site:wellfound.com "Product Engineer" OR "Full Stack" startup'
    enabled: true

  # -- YC Jobs --
  - name: YC Jobs — Founding Engineer
    query: 'site:workatastartup.com "Founding Engineer" OR "First Engineer" OR "0 to 1"'
    enabled: true

  - name: YC Jobs — Applied AI
    query: 'site:workatastartup.com "Applied AI" OR "AI Engineer" OR "AI Agent" OR "LLM"'
    enabled: true

  - name: YC Jobs — Forward Deployed & DevRel
    query: 'site:workatastartup.com "Forward Deployed" OR "Developer Advocate" OR "Solutions Architect"'
    enabled: true

  - name: YC Jobs — Full Stack & Product
    query: 'site:workatastartup.com "Full Stack" OR "Product Engineer" OR "Staff Engineer"'
    enabled: true

  - name: HN Who's Hiring — Founding & AI
    query: 'site:news.ycombinator.com "Who is hiring" "Founding Engineer" OR "AI Engineer" OR "Forward Deployed"'
    enabled: true

  # -- Workable --
  - name: Workable — AI & Founding
    query: 'site:apply.workable.com "AI Engineer" OR "Founding Engineer" OR "Applied AI" OR "Product Engineer"'
    enabled: true

  # -- General startup searches --
  - name: General — Founding Engineer
    query: '"Founding Engineer" startup "Series A" OR "Series B" OR "Seed" 2025 2026'
    enabled: true

  - name: General — AI Startup Roles
    query: '"AI Engineer" OR "Applied AI" startup "Series A" OR "Seed" remote 2025 2026'
    enabled: true

  - name: General — Staff & Lead at Startups
    query: '"Staff Engineer" OR "Lead Engineer" OR "Principal Engineer" startup venture-backed 2025 2026'
    enabled: true

  # -- Remote-focused boards --
  - name: Remotive — AI & Founding
    query: 'site:remotive.com "AI Engineer" OR "Founding Engineer" OR "Solutions Architect" OR "Forward Deployed"'
    enabled: true

  - name: WeWorkRemotely — AI & Startup
    query: 'site:weworkremotely.com "AI" OR "Founding Engineer" OR "Solutions Engineer" OR "Forward Deployed"'
    enabled: true

  - name: RemoteOK — AI & Founding
    query: 'site:remoteok.com "AI Engineer" OR "Founding Engineer" OR "Solutions Architect" OR "Forward Deployed"'
    enabled: true

  # -- Specialized AI boards --
  - name: ai-jobs.net — Founding & Applied AI
    query: 'site:ai-jobs.net "Founding Engineer" OR "Applied AI Engineer" OR "Founding" OR "Forward Deployed"'
    enabled: true

  - name: ai-jobs.net — DevRel & SA
    query: 'site:ai-jobs.net "Developer Advocate" OR "Solutions Architect" OR "DevRel"'
    enabled: true

  # -- Developer tools job boards --
  - name: Himalayas — AI & Startup Roles
    query: 'site:himalayas.app "AI Engineer" OR "Founding Engineer" OR "Solutions Architect" OR "Forward Deployed"'
    enabled: true

  - name: TrueUp — Startup Roles
    query: 'site:trueup.io "Founding Engineer" OR "AI Engineer" OR "Applied AI" OR "Staff Engineer" startup'
    enabled: true

  - name: fwddeploy.com — Forward Deployed Roles
    query: 'site:fwddeploy.com "Forward Deployed" OR "Deployed Engineer"'
    enabled: true

